        body { margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; }

        .titulo-principal { text-align: center; color: #2c3e50; font-size: 20px; margin: 0 0 15px 0; font-weight: bold; }
        .contenido-dinamico { display: grid; grid-template-columns: 380px 1fr; gap: 15px; height: calc(100vh - 100px); min-height: 600px; }
        .sidebar-izquierdo { display: flex; flex-direction: column; gap: 15px; height: 100%; overflow: hidden; }
        .filtros-container { background: white; padding: 18px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .filtro-municipio-completo { grid-column: 1 / -1; }
        .logo-dependencia { grid-column: 1 / -1; max-width: 100%; height: auto; max-height: 80px; margin: 0 auto 10px auto; object-fit: contain; }
        .campo-filtro { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; color: #4a5568; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
        select { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 13px; background-color: #fff; height: 38px; box-sizing: border-box; cursor: pointer; }
        select option { padding: 8px; }
        .seccion-lista { background: white; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden; flex-grow: 1; }
        .seccion-lista h2 { font-size: 16px; padding: 15px 15px 0 15px; margin: 0; color: #2c3e50; }
        #lista-centros { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .tarjeta-centro { background: #fff; border: 1px solid #e0e6ed; border-radius: 8px; padding: 15px; margin-bottom: 15px; transition: transform 0.2s, box-shadow 0.2s; }
        .tarjeta-centro:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.08); border-color: #cbd5e1; cursor: pointer; }
        .tarjeta-centro h3 { margin: 0 0 8px 0; font-size: 14px; color: #2c3e50; }
        .tarjeta-centro p { margin: 0 0 10px 0; font-size: 12px; color: #64748b; line-height: 1.4; }
        .btn-enlace { font-size: 12px; color: #2563eb; text-decoration: none; font-weight: bold; }
        #contenedor-mapa { height: 100%; width: 100%; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); border: 4px solid white; }
        .img-icon-custom { width: 18px; height: 18px; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); object-fit: contain; }
        .sin-resultados { padding: 20px; color: #64748b; font-size: 13px; text-align: center; }
        @media (max-width: 900px) { .contenido-dinamico { grid-template-columns: 1fr; height: auto; } .seccion-lista { height: 400px; } #contenedor-mapa { height: 450px; } }

                        <option value="5">Demencia</option>

                        <option value="10">Discapacidad Intelectual Salud Mental (DI SM)</option>
                        <option value="11">Mayores/Discapacidad (M/D)</option>
                    </select>
                </div>
            </div>

            </div>
        </div>

    </div>
</div>

    var todosLosMarcadores = [];

    function inicializarMarcadores() {
        centrosArray.forEach(function(centro) {
            // Colores por área: 1=Mayores(green), 2=Discapacidad(blue), 3=Salud mental(red), 4=M/D(orange)
            const colores = { 1: 'green', 2: 'blue', 3: 'red', 4: 'orange' };
            let color = colores[centro.area] || 'gray';
            let iconConfig = L.AwesomeMarkers.icon({ icon: 'fa-cog', markerColor: color, prefix: 'fa' });
            let marker = L.marker([centro.lat, centro.lng], {icon: iconConfig});

            // Sistema de respaldo para el favicon del marcador
            marker.on('add', function() {
                let markerElement = this.getElement();
                if (markerElement) {
                    let iconHtml = markerElement.querySelector('i');
                    if (iconHtml) {
                        iconHtml.className = ''; 
                        iconHtml.innerHTML = `<img src="favicon.ico" class="img-icon-custom" alt="icon" onerror="this.src='https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png'; this.style.width='12px'; this.style.top='5px';">`;
                    }
                }
            });

            marker.bindTooltip(`<b>${centro.nombre}</b>`, { permanent: false, direction: 'top', opacity: 0.9 });
            marker.on('click', function() { if (centro.url) window.open(centro.url, '_blank'); });
            todosLosMarcadores.push({ marker: marker, ...centro });
        });
    }

    function actualizarMapa() {
        const munCod = document.getElementById("filtro-municipio").value;
        const selArea = parseInt(document.getElementById("filtro-area").value);
        const selTipo = parseInt(document.getElementById("filtro-tipo_area").value);
        const selReq = parseInt(document.getElementById("filtro-requerimiento").value);
        const selPerf = parseInt(document.getElementById("filtro-perfil").value);

        const m = municipiosCoordenadas[munCod];
        map.flyTo([m.lat, m.lng], m.zoom);

        const contenedorLista = document.getElementById('lista-centros');
        contenedorLista.innerHTML = '';
        let totalListados = 0;

        todosLosMarcadores.forEach(function(item) {
            let matchMun = (munCod === 'la-palma' || item.municipio === munCod);
            let matchArea = (selArea === 0 || item.area === selArea);
            let matchTipo = (selTipo === 0 || item.tipo_area === selTipo);
            let matchReq = (selReq === 0 || item.requerimiento === selReq);
            let matchPerf = (selPerf === 0 || item.perfil === selPerf);

            if (matchMun && matchArea && matchTipo && matchReq && matchPerf) {
                map.addLayer(item.marker);
                totalListados++;
                contenedorLista.innerHTML += `
                    <div class="tarjeta-centro" onclick="hacerFocoMapa(${item.lat}, ${item.lng})">
                        <h3>${item.nombre}</h3>
                        <p>${item.descripcion}</p>
                        ${item.url ? `<a href="${item.url}" target="_blank" class="btn-enlace">Visitar web oficial</a>` : ''}
                    </div>
                `;
            } else {
                map.removeLayer(item.marker);
            }
        });

        if (totalListados === 0) {
            contenedorLista.innerHTML = `<div class="sin-resultados">No hay resultados para esta búsqueda.</div>`;
        }
    }

    function hacerFocoMapa(lat, lng) { map.flyTo([lat, lng], 16); }

    // Inicialización
    inicializarMarcadores();
    actualizarMapa();
</script>
